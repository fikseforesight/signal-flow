name: Daily signal scan

on:
  schedule:
      - cron: "17 11 * * *"
        workflow_dispatch: {}

        permissions:
          contents: write

          jobs:
            scan:
                runs-on: ubuntu-latest
                    steps:
                          - uses: actions/checkout@v4

                                - uses: actions/setup-node@v4
                                        with:
                                                  node-version: 20

                                                        - name: Run scan
                                                                env:
                                                                          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
                                                                                  run: node scan.mjs

                                                                                        - name: Commit fresh candidates
                                                                                                run: |
                                                                                                          git config user.name "signal-flow-bot"
                                                                                                                    git config user.email "actions@users.noreply.github.com"
                                                                                                                              git add -A
                                                                                                                                        git diff --cached --quiet && echo "No changes to commit" || git commit -m "Daily scan $(date -u +%F)"
                                                                                                                                                  git push
                                                                                                                                                  
